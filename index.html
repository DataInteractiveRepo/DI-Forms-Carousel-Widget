<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>mycar Image Carousel - Design 1</title>
    <script src="https://cdn.jotfor.ms/s/umd/latest/for-custom-widgets.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            background: transparent;
        }

        .widget-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Design 1: Modern Blue with mycar Curves */
        /* Upload Area Styles */
        .upload-area {
            border: 2px solid #00A6E9;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(135deg, #CCEDFB 0%, #f9f9f9 100%);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Curved design element background */
        .upload-area::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 166, 233, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: #1D174F;
            background: linear-gradient(135deg, #00A6E9 0%, #CCEDFB 100%);
            box-shadow: 0 8px 24px rgba(0, 166, 233, 0.2);
        }

        .upload-area-content {
            position: relative;
            z-index: 1;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: inline-block;
        }

        .upload-text {
            color: #1D174F;
            font-size: 18px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .upload-hint {
            color: #004B88;
            font-size: 13px;
            margin-bottom: 15px;
        }

        #file-input {
            display: none;
        }

        .btn-browse {
            background: linear-gradient(135deg, #00A6E9 0%, #004B88 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 166, 233, 0.3);
        }

        .btn-browse:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 166, 233, 0.4);
        }

        /* Carousel Styles */
        .carousel-container {
            position: relative;
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #f9f9f9 0%, #CCEDFB 100%);
            border-radius: 12px;
            overflow: hidden;
            display: none;
            margin-bottom: 15px;
            border: 2px solid #00A6E9;
        }

        .carousel-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.4s ease-in-out;
        }

        .carousel-slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .carousel-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .carousel-slide img:hover {
            transform: scale(1.05);
        }

        /* Navigation Arrows */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 166, 233, 0.8);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background-color: #1D174F;
            transform: translateY(-50%) scale(1.1);
        }

        .nav-prev {
            left: 15px;
        }

        .nav-next {
            right: 15px;
        }

        /* Image Counter & Delete */
        .slide-info {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(29, 23, 79, 0.8);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .btn-delete {
            position: absolute;
            top: 12px;
            right: 12px;
            background-color: #F39524;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(243, 149, 36, 0.3);
        }

        .btn-delete:hover {
            background-color: #E67E0F;
            transform: scale(1.15);
        }

        /* Thumbnail Strip */
        .thumbnails {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .thumbnail {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            cursor: pointer;
            opacity: 0.6;
            border: 3px solid transparent;
            transition: all 0.3s ease;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .thumbnail:hover {
            opacity: 0.8;
            transform: scale(1.08);
        }

        .thumbnail.active {
            opacity: 1;
            border-color: #00A6E9;
            box-shadow: 0 4px 12px rgba(0, 166, 233, 0.4);
        }

        /* Lightbox Styles */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(29, 23, 79, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox-overlay.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-container {
            position: relative;
            width: 90%;
            max-width: 90vh;
            height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .lightbox-overlay.active .lightbox-container {
            transform: scale(1);
        }

        .lightbox-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            animation: zoomIn 0.4s ease;
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background-color: #00A6E9;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            transition: all 0.2s ease;
        }

        .lightbox-close:hover {
            background-color: #F39524;
            transform: scale(1.1);
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background-color: #00A6E9;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            transition: all 0.2s ease;
        }

        .lightbox-nav:hover {
            background-color: #F39524;
            transform: translateY(-50%) scale(1.1);
        }

        .lightbox-nav.prev {
            left: 20px;
        }

        .lightbox-nav.next {
            right: 20px;
        }

        .lightbox-counter {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 166, 233, 0.9);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 1001;
            font-weight: 500;
        }

        /* Error message */
        .error-msg {
            display: none;
            color: #dc2626;
            font-size: 12px;
            margin-top: 6px;
            text-align: center;
        }
        .error-msg.visible { display: block; }

        /* View-only mode — no delete, no add, no thumbnails strip actions */
        body.view-only .btn-delete { display: none; }
        body.view-only .thumbnails { background: transparent; }

        /* Static/table mode — single image, compact */
        body.static-mode .carousel-container { height: 160px; }
        body.static-mode .thumbnails { display: none; }
        body.static-mode .btn-delete { display: none; }

        /* Responsive Design */
        @media (max-width: 480px) {
            .carousel-container {
                height: 250px;
            }

            .nav-btn {
                width: 38px;
                height: 38px;
                font-size: 18px;
            }

            .thumbnail {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <!-- Upload Area -->
        <div class="upload-area" id="drop-zone">
            <div class="upload-area-content">
                <div class="upload-icon">📸</div>
                <div class="upload-text">Drag & drop images here</div>
                <div class="upload-hint">PNG, JPG, GIF, WebP supported</div>
                <button class="btn-browse" onclick="document.getElementById('file-input').click()">Browse Files</button>
                <input type="file" id="file-input" multiple accept="image/*">
            </div>
        </div>

        <div class="error-msg" id="error-msg"></div>

        <!-- Carousel Area -->
        <div class="carousel-container" id="carousel">
            <button class="nav-btn nav-prev" id="btn-prev" onclick="moveSlide(-1)">&#10094;</button>
            <button class="nav-btn nav-next" id="btn-next" onclick="moveSlide(1)">&#10095;</button>
            
            <div class="carousel-track" id="track"></div>
        </div>

        <!-- Thumbnails -->
        <div class="thumbnails" id="thumbnails"></div>
    </div>

    <!-- Lightbox Overlay -->
    <div class="lightbox-overlay" id="lightbox-overlay">
        <div class="lightbox-container">
            <img id="lightbox-image" class="lightbox-image" src="" alt="">
            <button class="lightbox-close" onclick="closeLightbox()">×</button>
            <button class="lightbox-nav prev" onclick="lightboxPrev()">&#10094;</button>
            <button class="lightbox-nav next" onclick="lightboxNext()">&#10095;</button>
            <div class="lightbox-counter">
                <span id="lightbox-counter-text">1 / 1</span>
            </div>
        </div>
    </div>

    <script>
        let uploadedImages = [];
        let currentSlide = 0;
        let isRequired = false;
        let lightboxCurrentIndex = 0;
        let uploadServerURL = '';
        let uploadFolder = '';

        // Generate a folder ID matching Jotform's format: formID_hexTimestamp+seed
        function generateFolder(formID) {
            var seed = Math.floor(Math.random() * 0x75bcd15).toString(16);
            var time = Math.floor(new Date().getTime() / 1000).toString(16);
            return formID + '_' + time + seed;
        }

        // Build Jotform metadata structure
        function buildMetadataValue() {
            if (uploadedImages.length === 0) return '';
            return JFCustomWidgetUtils.buildMetadata('imagelinks', uploadedImages.map(function (img) {
                var isDataUri = img.base64 && img.base64.indexOf('data:') === 0;
                if (isDataUri) {
                    return { name: img.name, base64: img.base64 };
                } else {
                    return { name: img.name, url: JFCustomWidgetUtils.getS3UriRelativePath(img.base64) };
                }
            }));
        }

        // Upload file to Jotform server
        function uploadToJotform(file, callback) {
            var origin = uploadServerURL.replace('/upload', '');
            var url = origin + '/server.php?action=handleWidgetFiles&type=save';

            var formData = new FormData();
            formData.append('file', file, file.name);

            fetch(url, {
                method: 'POST',
                body: formData
            })
            .then(function (res) { return res.json(); })
            .then(function (response) {
                console.log('[uploadToJotform] response:', JSON.stringify(response));
                if (response && response.success && response.message) {
                    callback(response.message);
                } else {
                    callback(null);
                }
            })
            .catch(function () { callback(null); });
        }

        // Read file as base64
        function readAsBase64(file, onDone) {
            var reader = new FileReader();
            reader.onload = function (e) {
                onDone(e.target.result);
            };
            reader.readAsDataURL(file);
        }

        // Show error message
        function showError(msg) {
            var el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.add('visible');
            setTimeout(function () { el.classList.remove('visible'); }, 4000);
        }

        // Send current value to Jotform
        function sendCurrentValue() {
            JFCustomWidget.sendData({ value: buildMetadataValue() });
        }

        // Request frame resize
        function requestResize() {
            setTimeout(function () {
                JFCustomWidget.requestFrameResize({
                    height: document.body.scrollHeight + 20
                });
            }, 50);
        }

        // Process uploaded files
        function processFiles(files) {
            var imageFiles = Array.from(files).filter(function (f) {
                return f.type.startsWith('image/');
            });

            if (imageFiles.length === 0) {
                showError('Please select image files only.');
                return;
            }

            var processed = 0;

            function onImageReady() {
                processed++;
                if (processed === imageFiles.length) {
                    currentSlide = uploadedImages.length - 1;
                    updateCarousel();
                    sendCurrentValue();
                }
            }

            imageFiles.forEach(function (file) {
                if (uploadServerURL && uploadFolder) {
                    uploadToJotform(file, function (url) {
                        if (url) {
                            uploadedImages.push({ name: file.name, base64: url });
                            onImageReady();
                        } else {
                            readAsBase64(file, function (dataUri) {
                                uploadedImages.push({ name: file.name, base64: dataUri });
                                onImageReady();
                            });
                        }
                    });
                } else {
                    readAsBase64(file, function (dataUri) {
                        uploadedImages.push({ name: file.name, base64: dataUri });
                        onImageReady();
                    });
                }
            });
        }

        // Update carousel display
        function updateCarousel() {
            const carousel = document.getElementById('carousel');
            const track = document.getElementById('track');
            const thumbsContainer = document.getElementById('thumbnails');
            const dropZone = document.getElementById('drop-zone');
            
            if (uploadedImages.length === 0) {
                carousel.style.display = 'none';
                dropZone.style.display = 'block';
                thumbsContainer.innerHTML = '';
                requestResize();
                return;
            }

            dropZone.style.display = 'none';
            carousel.style.display = 'block';
            
            if (currentSlide >= uploadedImages.length) {
                currentSlide = Math.max(0, uploadedImages.length - 1);
            }

            track.innerHTML = '';
            thumbsContainer.innerHTML = '';

            uploadedImages.forEach((img, index) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                slide.innerHTML = `
                    <img src="${img.base64}" alt="${img.name}" onclick="openLightbox(${index})">
                    <button class="btn-delete" onclick="deleteImage(${index})" title="Remove image">&times;</button>
                    <div class="slide-info">${index + 1} / ${uploadedImages.length}</div>
                `;
                track.appendChild(slide);

                const thumb = document.createElement('img');
                thumb.src = img.base64;
                thumb.className = `thumbnail ${index === currentSlide ? 'active' : ''}`;
                thumb.onclick = () => goToSlide(index);
                thumbsContainer.appendChild(thumb);
            });

            document.getElementById('btn-prev').style.display = uploadedImages.length > 1 ? 'flex' : 'none';
            document.getElementById('btn-next').style.display = uploadedImages.length > 1 ? 'flex' : 'none';

            goToSlide(currentSlide);
            requestResize();
        }

        function moveSlide(direction) {
            let newSlide = currentSlide + direction;
            if (newSlide < 0) newSlide = uploadedImages.length - 1;
            if (newSlide >= uploadedImages.length) newSlide = 0;
            goToSlide(newSlide);
        }

        function goToSlide(index) {
            currentSlide = index;
            const track = document.getElementById('track');
            track.style.transform = `translateX(-${currentSlide * 100}%)`;

            const thumbs = document.querySelectorAll('.thumbnail');
            thumbs.forEach((thumb, i) => {
                if (i === currentSlide) {
                    thumb.classList.add('active');
                } else {
                    thumb.classList.remove('active');
                }
            });
        }

        function deleteImage(index) {
            uploadedImages.splice(index, 1);
            updateCarousel();
            sendCurrentValue();
        }

        function openLightbox(index) {
            lightboxCurrentIndex = index;
            const overlay = document.getElementById('lightbox-overlay');
            const image = document.getElementById('lightbox-image');
            
            image.src = uploadedImages[index].base64;
            updateLightboxCounter();
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            document.addEventListener('keydown', handleLightboxKeyboard);
        }

        function closeLightbox() {
            const overlay = document.getElementById('lightbox-overlay');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
            document.removeEventListener('keydown', handleLightboxKeyboard);
        }

        function lightboxPrev() {
            lightboxCurrentIndex--;
            if (lightboxCurrentIndex < 0) {
                lightboxCurrentIndex = uploadedImages.length - 1;
            }
            updateLightboxImage();
        }

        function lightboxNext() {
            lightboxCurrentIndex++;
            if (lightboxCurrentIndex >= uploadedImages.length) {
                lightboxCurrentIndex = 0;
            }
            updateLightboxImage();
        }

        function updateLightboxImage() {
            const image = document.getElementById('lightbox-image');
            image.src = uploadedImages[lightboxCurrentIndex].base64;
            updateLightboxCounter();
        }

        function updateLightboxCounter() {
            const counter = document.getElementById('lightbox-counter-text');
            counter.textContent = `${lightboxCurrentIndex + 1} / ${uploadedImages.length}`;
        }

        function handleLightboxKeyboard(e) {
            if (e.key === 'ArrowLeft') {
                lightboxPrev();
            } else if (e.key === 'ArrowRight') {
                lightboxNext();
            } else if (e.key === 'Escape') {
                closeLightbox();
            }
        }

        document.getElementById('lightbox-overlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closeLightbox();
            }
        });

        // File input handling
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');

        fileInput.addEventListener('change', function (e) {
            if (e.target.files.length) processFiles(e.target.files);
            e.target.value = '';
        });

        dropZone.addEventListener('dragover', function (e) {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', function () {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', function (e) {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) processFiles(e.dataTransfer.files);
        });

        // Jotform widget lifecycle
        JFCustomWidget.subscribe('ready', function (data) {
            isRequired = JFCustomWidget.isWidgetRequired();
            uploadServerURL = data.uploadServerURL || '';
            if (uploadServerURL) {
                uploadFolder = generateFolder(data.formID);
            }

            // Static mode — widget is being viewed in tables/submission view
            var isStatic = JFCustomWidget.isWidgetStatic();

            // Edit mode — form loaded with an existing submission value
            var isEditMode = data.isEditMode || (data.value && data.value.length > 0);

            if (isStatic) {
                document.body.classList.add('static-mode', 'view-only');
            } else if (isEditMode) {
                document.body.classList.add('view-only');
            }

            // Restore saved value (edit mode or static)
            if (data.value && JFCustomWidgetUtils.hasMetadata(data.value)) {
                var extracted = JFCustomWidgetUtils.extractMetadata(data.value);
                if (extracted && extracted.length > 0) {
                    uploadedImages = extracted.map(function (item) {
                        var src = item.base64 || '';
                        if (!src && item.url) {
                            src = JFCustomWidgetUtils.fixS3UriOrigin(item.url);
                        }
                        return { name: item.name, base64: src };
                    }).filter(function (img) { return !!img.base64; });
                    currentSlide = 0;
                    if (uploadedImages.length > 0) updateCarousel();
                }
            }

            // Hide upload element when editLink is present
            var editLink = data.editLink || false;
            if (editLink) {
                document.getElementById('drop-zone').style.display = 'none';
            }

            // In static mode with no value — show nothing
            if (isStatic && uploadedImages.length === 0) {
                document.getElementById('drop-zone').style.display = 'none';
                requestResize();
                return;
            }

            JFCustomWidget.subscribe('submit', function () {
                var value = buildMetadataValue();
                var valid = !isRequired || uploadedImages.length > 0;

                if (!valid) {
                    JFCustomWidget.showWidgetError(JFCustomWidget.texts.required || 'This field is required.');
                } else {
                    JFCustomWidget.hideWidgetError();
                }

                JFCustomWidget.sendSubmit({ valid: valid, value: value });
            });

            JFCustomWidget.subscribe('clear', function () {
                uploadedImages = [];
                currentSlide = 0;
                document.body.classList.remove('view-only');
                updateCarousel();
                sendCurrentValue();
            });

            requestResize();
        });
    </script>
</body>
</html>
