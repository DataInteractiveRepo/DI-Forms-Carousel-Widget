<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>mycar Image Carousel - Design 1</title>
    <script src="//js.jotform.com/JotFormCustomWidget.min.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            background: transparent;
        }

        .widget-container {
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            box-sizing: border-box;
        }

        /* Design 1: Modern Blue with mycar Curves */
        /* Upload Area Styles */
        .upload-area {
            border: 2px solid #00A6E9;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(135deg, #CCEDFB 0%, #f9f9f9 100%);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Curved design element background */
        .upload-area::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 166, 233, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: #1D174F;
            background: linear-gradient(135deg, #00A6E9 0%, #CCEDFB 100%);
            box-shadow: 0 8px 24px rgba(0, 166, 233, 0.2);
        }

        .upload-area-content {
            position: relative;
            z-index: 1;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .upload-text {
            color: #1D174F;
            font-size: 18px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .upload-hint {
            color: #004B88;
            font-size: 13px;
            margin-bottom: 15px;
        }

        #file-input {
            display: none;
        }

        .btn-browse {
            background: linear-gradient(135deg, #00A6E9 0%, #004B88 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 166, 233, 0.3);
        }

        .btn-browse:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 166, 233, 0.4);
        }

        /* Carousel Styles - RESPONSIVE FIX */
        .carousel-container {
            position: relative;
            width: 100%;
            aspect-ratio: 2 / 1;
            min-height: 200px;
            max-height: 500px;
            background: linear-gradient(135deg, #f9f9f9 0%, #CCEDFB 100%);
            border-radius: 12px;
            overflow: hidden;
            display: none;
            margin-bottom: 15px;
            border: 2px solid #00A6E9;
            box-sizing: border-box;
        }

        .carousel-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.4s ease-in-out;
        }

        .carousel-slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .carousel-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.2s ease;
            width: auto;
            height: auto;
        }

        .carousel-slide img:hover {
            transform: scale(1.05);
        }

        /* Navigation Arrows */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 166, 233, 0.8);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .nav-btn:hover {
            background-color: #1D174F;
            transform: translateY(-50%) scale(1.1);
        }

        .nav-prev {
            left: 15px;
        }

        .nav-next {
            right: 15px;
        }

        /* Image Counter & Delete */
        .slide-info {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(29, 23, 79, 0.8);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .btn-delete {
            position: absolute;
            top: 12px;
            right: 12px;
            background-color: #F39524;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(243, 149, 36, 0.3);
            flex-shrink: 0;
        }

        .btn-delete:hover {
            background-color: #E67E0F;
            transform: scale(1.15);
        }

        /* Thumbnail Strip */
        .thumbnails {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            overflow-x: auto;
            padding-bottom: 8px;
            box-sizing: border-box;
        }

        .thumbnail {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            cursor: pointer;
            opacity: 0.6;
            border: 3px solid transparent;
            transition: all 0.3s ease;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .thumbnail:hover {
            opacity: 0.8;
            transform: scale(1.08);
        }

        .thumbnail.active {
            opacity: 1;
            border-color: #00A6E9;
            box-shadow: 0 4px 12px rgba(0, 166, 233, 0.4);
        }

        /* Lightbox Styles */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(29, 23, 79, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox-overlay.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-container {
            position: relative;
            width: 90%;
            max-width: 90vh;
            height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .lightbox-overlay.active .lightbox-container {
            transform: scale(1);
        }

        .lightbox-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            animation: zoomIn 0.4s ease;
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background-color: #00A6E9;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .lightbox-close:hover {
            background-color: #F39524;
            transform: scale(1.1);
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background-color: #00A6E9;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .lightbox-nav:hover {
            background-color: #F39524;
            transform: translateY(-50%) scale(1.1);
        }

        .lightbox-nav.prev {
            left: 20px;
        }

        .lightbox-nav.next {
            right: 20px;
        }

        .lightbox-counter {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 166, 233, 0.9);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 1001;
            font-weight: 500;
        }

        /* ===== ENHANCED RESPONSIVE DESIGN ===== */
        /* Extra Small Devices (320px - 480px) */
        @media (max-width: 480px) {
            .widget-container {
                padding: 0;
            }

            .upload-area {
                padding: 30px 15px;
                margin-bottom: 15px;
            }

            .upload-icon {
                font-size: 40px;
                margin-bottom: 10px;
            }

            .upload-text {
                font-size: 16px;
            }

            .upload-hint {
                font-size: 12px;
            }

            .btn-browse {
                padding: 10px 20px;
                font-size: 13px;
            }

            /* Carousel responsive on mobile */
            .carousel-container {
                aspect-ratio: 16 / 12;
                min-height: 180px;
                margin-bottom: 12px;
                border-radius: 8px;
            }

            .nav-btn {
                width: 36px;
                height: 36px;
                font-size: 16px;
                left: 8px;
            }

            .nav-next {
                right: 8px;
            }

            .slide-info {
                font-size: 11px;
                padding: 4px 10px;
                bottom: 10px;
            }

            .btn-delete {
                width: 28px;
                height: 28px;
                font-size: 16px;
                top: 8px;
                right: 8px;
            }

            .thumbnail {
                width: 50px;
                height: 50px;
                gap: 8px;
            }

            .thumbnails {
                gap: 8px;
                margin-top: 12px;
            }

            .lightbox-close {
                width: 40px;
                height: 40px;
                font-size: 24px;
                top: 10px;
                right: 10px;
            }

            .lightbox-nav {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }

            .lightbox-nav.prev {
                left: 10px;
            }

            .lightbox-nav.next {
                right: 10px;
            }

            .lightbox-counter {
                font-size: 12px;
                padding: 6px 12px;
                bottom: 10px;
            }
        }

        /* Small Devices (481px - 768px) */
        @media (min-width: 481px) and (max-width: 768px) {
            .carousel-container {
                aspect-ratio: 16 / 10;
                min-height: 220px;
            }

            .nav-btn {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }

            .thumbnail {
                width: 55px;
                height: 55px;
            }
        }

        /* Medium Devices and Up (769px+) */
        @media (min-width: 769px) {
            .widget-container {
                max-width: 600px;
            }

            .carousel-container {
                aspect-ratio: 2 / 1;
                min-height: 250px;
            }
        }

        /* Landscape orientation adjustments */
        @media (orientation: landscape) and (max-height: 500px) {
            .carousel-container {
                aspect-ratio: 16 / 8;
                min-height: 150px;
            }

            .nav-btn {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }

            .thumbnail {
                width: 45px;
                height: 45px;
            }
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <!-- Upload Area -->
        <div class="upload-area" id="drop-zone">
            <div class="upload-area-content">
                <div class="upload-icon">📸</div>
                <div class="upload-text">Drag & drop images here</div>
                <div class="upload-hint">PNG, JPG, GIF, WebP supported</div>
                <button class="btn-browse" onclick="document.getElementById('file-input').click()">Browse Files</button>
                <input type="file" id="file-input" multiple accept="image/*">
            </div>
        </div>

        <!-- Carousel Area -->
        <div class="carousel-container" id="carousel">
            <button class="nav-btn nav-prev" id="btn-prev" onclick="moveSlide(-1)">&#10094;</button>
            <button class="nav-btn nav-next" id="btn-next" onclick="moveSlide(1)">&#10095;</button>
            
            <div class="carousel-track" id="track"></div>
        </div>

        <!-- Thumbnails -->
        <div class="thumbnails" id="thumbnails"></div>
    </div>

    <!-- Lightbox Overlay -->
    <div class="lightbox-overlay" id="lightbox-overlay">
        <div class="lightbox-container">
            <img id="lightbox-image" class="lightbox-image" src="" alt="">
            <button class="lightbox-close" onclick="closeLightbox()">×</button>
            <button class="lightbox-nav prev" onclick="lightboxPrev()">&#10094;</button>
            <button class="lightbox-nav next" onclick="lightboxNext()">&#10095;</button>
            <div class="lightbox-counter">
                <span id="lightbox-counter-text">1 / 1</span>
            </div>
        </div>
    </div>

    <script>
        let uploadedImages = [];
        let currentSlide = 0;
        let isRequired = false;
        let lightboxCurrentIndex = 0;

        JFCustomWidget.subscribe("ready", function(msg) {
            isRequired = JFCustomWidget.getWidgetSetting('required') === 'Yes';
            requestResize();
            
            JFCustomWidget.subscribe("submit", function() {
                let isValid = true;
                if (isRequired && uploadedImages.length === 0) {
                    isValid = false;
                }
                
                let resultData = {
                    valid: isValid,
                    value: uploadedImages.length > 0 ? JSON.stringify(uploadedImages.map(img => ({
                        name: img.name,
                        type: img.type,
                        size: img.size,
                        data: img.data
                    }))) : ""
                };
                
                JFCustomWidget.sendSubmit(resultData);
            });
        });

        function requestResize() {
            setTimeout(() => {
                JFCustomWidget.requestFrameResize({
                    height: document.body.scrollHeight + 20
                });
            }, 100);
        }

        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');

        fileInput.addEventListener('change', handleFiles);

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            
            if (e.dataTransfer.files.length > 0) {
                fileInput.files = e.dataTransfer.files;
                handleFiles({ target: fileInput });
            }
        });

        function handleFiles(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            let filesProcessed = 0;

            files.forEach(file => {
                if (!file.type.startsWith('image/')) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    uploadedImages.push({
                        id: Date.now() + Math.random().toString(36).substr(2, 9),
                        name: file.name,
                        type: file.type,
                        size: file.size,
                        data: event.target.result
                    });

                    filesProcessed++;
                    if (filesProcessed === files.filter(f => f.type.startsWith('image/')).length) {
                        updateCarousel();
                        updateWidgetValue();
                    }
                };
                reader.readAsDataURL(file);
            });
            
            fileInput.value = '';
        }

        function updateCarousel() {
            const carousel = document.getElementById('carousel');
            const track = document.getElementById('track');
            const thumbsContainer = document.getElementById('thumbnails');
            
            if (uploadedImages.length === 0) {
                carousel.style.display = 'none';
                thumbsContainer.innerHTML = '';
                requestResize();
                return;
            }

            carousel.style.display = 'block';
            
            if (currentSlide >= uploadedImages.length) {
                currentSlide = Math.max(0, uploadedImages.length - 1);
            }

            track.innerHTML = '';
            thumbsContainer.innerHTML = '';

            uploadedImages.forEach((img, index) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                slide.innerHTML = `
                    <img src="${img.data}" alt="${img.name}" onclick="openLightbox(${index})">
                    <button class="btn-delete" onclick="deleteImage(${index})" title="Remove image">&times;</button>
                    <div class="slide-info">${index + 1} / ${uploadedImages.length}</div>
                `;
                track.appendChild(slide);

                const thumb = document.createElement('img');
                thumb.src = img.data;
                thumb.className = `thumbnail ${index === currentSlide ? 'active' : ''}`;
                thumb.onclick = () => goToSlide(index);
                thumbsContainer.appendChild(thumb);
            });

            document.getElementById('btn-prev').style.display = uploadedImages.length > 1 ? 'flex' : 'none';
            document.getElementById('btn-next').style.display = uploadedImages.length > 1 ? 'flex' : 'none';

            goToSlide(currentSlide);
            requestResize();
        }

        function moveSlide(direction) {
            let newSlide = currentSlide + direction;
            if (newSlide < 0) newSlide = uploadedImages.length - 1;
            if (newSlide >= uploadedImages.length) newSlide = 0;
            goToSlide(newSlide);
        }

        function goToSlide(index) {
            currentSlide = index;
            const track = document.getElementById('track');
            track.style.transform = `translateX(-${currentSlide * 100}%)`;

            const thumbs = document.querySelectorAll('.thumbnail');
            thumbs.forEach((thumb, i) => {
                if (i === currentSlide) {
                    thumb.classList.add('active');
                } else {
                    thumb.classList.remove('active');
                }
            });
        }

        function deleteImage(index) {
            uploadedImages.splice(index, 1);
            updateCarousel();
            updateWidgetValue();
        }

        function updateWidgetValue() {
            const value = uploadedImages.length > 0 ? JSON.stringify(uploadedImages.map(img => ({
                name: img.name,
                type: img.type,
                size: img.size,
                data: img.data
            }))) : "";
            
            JFCustomWidget.sendData({ value: value });
        }

        function openLightbox(index) {
            lightboxCurrentIndex = index;
            const overlay = document.getElementById('lightbox-overlay');
            const image = document.getElementById('lightbox-image');
            
            image.src = uploadedImages[index].data;
            updateLightboxCounter();
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            document.addEventListener('keydown', handleLightboxKeyboard);
        }

        function closeLightbox() {
            const overlay = document.getElementById('lightbox-overlay');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
            document.removeEventListener('keydown', handleLightboxKeyboard);
        }

        function lightboxPrev() {
            lightboxCurrentIndex--;
            if (lightboxCurrentIndex < 0) {
                lightboxCurrentIndex = uploadedImages.length - 1;
            }
            updateLightboxImage();
        }

        function lightboxNext() {
            lightboxCurrentIndex++;
            if (lightboxCurrentIndex >= uploadedImages.length) {
                lightboxCurrentIndex = 0;
            }
            updateLightboxImage();
        }

        function updateLightboxImage() {
            const image = document.getElementById('lightbox-image');
            image.src = uploadedImages[lightboxCurrentIndex].data;
            updateLightboxCounter();
        }

        function updateLightboxCounter() {
            const counter = document.getElementById('lightbox-counter-text');
            counter.textContent = `${lightboxCurrentIndex + 1} / ${uploadedImages.length}`;
        }

        function handleLightboxKeyboard(e) {
            if (e.key === 'ArrowLeft') {
                lightboxPrev();
            } else if (e.key === 'ArrowRight') {
                lightboxNext();
            } else if (e.key === 'Escape') {
                closeLightbox();
            }
        }

        document.getElementById('lightbox-overlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
